<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
margin-top:100px;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.license{
font-size:20px;
font-weight:bold;
color:#16a34a;
margin-top:20px;
}
</style>

</head>

<body>

<div class="box">
<h2>Payment Successful</h2>
<p>Your license has been generated.</p>
<div id="license" class="license"></div>
<p>Copy this license and activate inside the app.</p>
</div>

<script>

const supabaseUrl = "https://ofbsotsqpeentfylextt.supabase.co";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

const client = supabase.createClient(supabaseUrl, supabaseKey);

function generateLicense(){

return "SMS-" + Math.random().toString(36).substring(2,10).toUpperCase();

}

async function createLicense(){

let license = generateLicense();

document.getElementById("license").innerHTML = license;

await client
.from("licenses")
.insert([
{
license_key: license,
status: "active"
}
]);

}

createLicense();

</script>

</body>
</html>
