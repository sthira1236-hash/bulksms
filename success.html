<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
margin-top:100px;
}

.box{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.license{
font-size:20px;
color:#0d6efd;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>Payment Successful</h2>

<p>Your license has been generated.</p>

<div class="license" id="license"></div>

<p>Copy this license and activate inside the app.</p>

</div>

<script>

const supabaseUrl = "https://ofbsotsqpeentfylextt.supabase.co";
const supabaseKey = "https://sthira1236-hash.github.io/bulksms/success.html";

const client = supabase.createClient(supabaseUrl, supabaseKey);

function generateLicense(){
return "SMS-" + Math.random().toString(36).substring(2,10).toUpperCase();
}

async function createLicense(){

let license = generateLicense();

await client
.from("licenses")
.insert([{license_key: license, status: "active"}]);

document.getElementById("license").innerHTML = license;

}

createLicense();

</script>

</body>
</html>
