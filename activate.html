<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "PASTE_PROJECT_URL_HERE";
const supabaseKey = "PASTE_PUBLISHABLE_KEY_HERE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function generateLicense(){

let deviceId = document.getElementById("deviceid").value;

if(deviceId==""){
alert("Enter Device ID");
return;
}

let license = btoa(deviceId + "-RADHA-BULKSMS");

document.getElementById("result").innerHTML =
"License Key: <b>"+license+"</b>";

await client
.from("licenses")
.insert([
{
device_id: deviceId,
license_key: license
}
]);

}

</script>
