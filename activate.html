<!DOCTYPE html>
<html>
<head>
<title>Activate License</title>
<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding:60px;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 30px;
background:#1e73e8;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Activate Bulk SMS License</h2>

<p>Enter your Device ID</p>

<input id="deviceid" placeholder="Device ID">

<button onclick="generate()">Generate License</button>

<h3 id="result"></h3>

</div>

<script>

function generate(){

var id=document.getElementById("deviceid").value;

var license=btoa(id+"-RADHA-BULKSMS");

document.getElementById("result").innerText="License Key: "+license;

}

</script>

</body>
</html>
