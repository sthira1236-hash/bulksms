<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Bulk SMS License</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#2d7df6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1c5ad8;
}

#result{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Activate License</h2>

<p>Enter your License Key</p>

<input id="licensekey" placeholder="License Key">

<p>Enter Device ID</p>

<input id="deviceid" placeholder="Device ID">

<button onclick="activateLicense()">Activate License</button>

<div id="result"></div>

</div>

<script>

const supabaseUrl = "https://ofbsotsqpeentfylextt.supabase.co";
const supabaseKey = "sb_publishable_Fj7rL2hMV5PicBRmJ_zhDQ_1Qmns_zc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function activateLicense(){

let license = document.getElementById("licensekey").value;
let deviceId = document.getElementById("deviceid").value;

if(license=="" || deviceId==""){
alert("Enter License and Device ID");
return;
}

const { data } = await client
.from("licenses")
.select("*")
.eq("license_key",license)
.single();

if(!data){

document.getElementById("result").innerHTML="Invalid License";
return;

}

if(data.device_id && data.device_id !== deviceId){

document.getElementById("result").innerHTML="License already used on another device";
return;

}

await client
.from("licenses")
.update({ device_id: deviceId })
.eq("license_key",license);

document.getElementById("result").innerHTML="License Activated Successfully";

}

</script>

</body>

</html>
