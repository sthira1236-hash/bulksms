<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate License</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
margin-top:100px;
}

.box{
background:white;
padding:30px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:18px;
color:#28a745;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Activate License</h2>

<p>Enter your Device ID to generate license.</p>

<input type="text" id="deviceid" placeholder="Enter Device ID">

<br>

<button onclick="generateLicense()">Generate License</button>

<div class="result" id="result"></div>

</div>

<script>

if(localStorage.getItem("paid") !== "yes"){
alert("Please purchase the license first.");
window.location.href="index.html";
}

const supabaseUrl = "https://ofbsotsqpeentfylextt.supabase.co";
const supabaseKey = "sb_publishable_Fj7rL2hMV5PicBRmJ_zhDQ_1Qmns_zc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function generateLicense(){

let deviceId = document.getElementById("deviceid").value;

if(deviceId==""){
alert("Enter Device ID");
return;
}

let license = btoa(deviceId + "-RADHA-BULKSMS");

document.getElementById("result").innerHTML =
"License Key: " + license;

await client.from("licenses").insert([
{
device_id: deviceId,
license_key: license
}
]);

}

</script>

</body>
</html>
