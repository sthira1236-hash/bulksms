<!DOCTYPE html>
<html>
<head>

<title>Activate Bulk SMS License</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
width:350px;
}

input{
width:100%;
padding:10px;
margin-top:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#2d7df6;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1f5ed6;
}

#result{
margin-top:20px;
font-weight:bold;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="box">

<h2>Activate Bulk SMS License</h2>

<p>Enter your Device ID</p>

<input id="deviceid" placeholder="Device ID">

<button onclick="generateLicense()">Generate License</button>

<div id="result"></div>

</div>

<script>

const supabaseUrl = "https://ofbsotsqpeentfylextt.supabase.co";
const supabaseKey = "sb_publishable_Fj7rL2hMV5PicBRmJ_zhDQ_1Qnms_zc";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function generateLicense(){

let deviceId = document.getElementById("deviceid").value;

if(deviceId==""){
alert("Enter Device ID");
return;
}

let license = btoa(deviceId + "-RADHA-BULKSMS");

document.getElementById("result").innerHTML =
"License Key: <br><b>"+license+"</b>";

await client.from("licenses").insert([
{
device_id: deviceId,
license_key: license
}
]);

}

</script>

</body>
</html>
